{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tablero de Salas{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'proyectobd/css/styles.css' %}">
</head>
<body>

  <header class="masthead">
    <a href="{% url 'lista_reservaciones' %}" class="masthead__brand">
      <span class="masthead__dot"></span>
      <span>Tablero&nbsp;de&nbsp;Salas</span>
    </a>
    <nav class="masthead__nav">
      <a href="{% url 'lista_reservaciones' %}" class="masthead__link">Tablero</a>
      <a href="{% url 'crear_reservacion' %}" class="masthead__link masthead__link--cta">+ Nueva reservación</a>
    </nav>
  </header>

  {% if messages %}
    <div class="toast-stack">
      {% for message in messages %}
        <div class="toast toast--{{ message.tags|default:'info' }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="shell">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
