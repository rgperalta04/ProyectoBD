{% extends "base.html" %}

{% block title %}Editar reservación{% endblock %}

{% block content %}

  <div class="form-card">
    <span class="form-card__eyebrow">Reservación #{{ reservacion.id }}</span>
    <h1 class="form-card__title">Editar reservación</h1>

    <form method="post" class="styled-form">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="form-card__actions">
        <button type="submit" class="btn btn--primary">Guardar cambios</button>
        <a href="{% url 'detalle_reservacion' reservacion.id %}" class="btn btn--ghost">Cancelar</a>
      </div>
    </form>
  </div>

{% endblock %}
