<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar reservación</title>
</head>
<body>
    <h1>Editar reservación</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Guardar cambios</button>
    </form>

    <p>
        <a href="{% url 'detalle_reservacion' reservacion.id %}">Cancelar y volver</a>
    </p>
</body>
</html>
